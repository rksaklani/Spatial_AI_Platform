# Production Docker Compose configuration
# Note: 'version' is obsolete in modern Docker Compose

services:
  # MongoDB database
  mongodb:
    image: mongo:7.0
    container_name: spatial-ai-mongodb-prod
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: spatial_ai_platform
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - spatial-ai-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Valkey for caching and job queue
  valkey:
    image: valkey/valkey:7.2
    container_name: spatial-ai-valkey-prod
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    networks:
      - spatial-ai-network
    command: valkey-server --requirepass ${VALKEY_PASSWORD}
    healthcheck:
      test: ["CMD", "valkey-cli", "--pass", "${VALKEY_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # MinIO object storage
  minio:
    image: minio/minio:latest
    container_name: spatial-ai-minio-prod
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - spatial-ai-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # FastAPI API server
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: spatial-ai-api-prod
    restart: always
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/spatial_ai_platform?authSource=admin
      - DATABASE_NAME=spatial_ai_platform
      - VALKEY_HOST=valkey
      - VALKEY_PORT=6379
      - VALKEY_DB=0
      - VALKEY_PASSWORD=${VALKEY_PASSWORD}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - MINIO_SECURE=false
      - CELERY_BROKER_URL=redis://:${VALKEY_PASSWORD}@valkey:6379/0
      - CELERY_RESULT_BACKEND=redis://:${VALKEY_PASSWORD}@valkey:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ENVIRONMENT=production
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - CORS_ORIGINS=${CORS_ORIGINS}
    networks:
      - spatial-ai-network
    depends_on:
      mongodb:
        condition: service_healthy
      valkey:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  # Celery worker for CPU tasks
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: spatial-ai-celery-worker-prod
    restart: always
    environment:
      - MONGODB_URL=mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/spatial_ai_platform?authSource=admin
      - DATABASE_NAME=spatial_ai_platform
      - VALKEY_HOST=valkey
      - VALKEY_PORT=6379
      - VALKEY_DB=0
      - VALKEY_PASSWORD=${VALKEY_PASSWORD}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - MINIO_SECURE=false
      - CELERY_BROKER_URL=redis://:${VALKEY_PASSWORD}@valkey:6379/0
      - CELERY_RESULT_BACKEND=redis://:${VALKEY_PASSWORD}@valkey:6379/0
      - ENVIRONMENT=production
    networks:
      - spatial-ai-network
    depends_on:
      - valkey
      - mongodb
      - minio
    command: celery -A workers.celery_app worker --loglevel=info --queues=cpu --concurrency=4 --max-tasks-per-child=100
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

  # Celery worker for GPU tasks (requires NVIDIA GPU)
  celery-gpu-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.gpu
      target: production
    container_name: spatial-ai-celery-gpu-worker-prod
    restart: always
    environment:
      - MONGODB_URL=mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/spatial_ai_platform?authSource=admin
      - DATABASE_NAME=spatial_ai_platform
      - VALKEY_HOST=valkey
      - VALKEY_PORT=6379
      - VALKEY_DB=0
      - VALKEY_PASSWORD=${VALKEY_PASSWORD}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - MINIO_SECURE=false
      - CELERY_BROKER_URL=redis://:${VALKEY_PASSWORD}@valkey:6379/0
      - CELERY_RESULT_BACKEND=redis://:${VALKEY_PASSWORD}@valkey:6379/0
      - ENVIRONMENT=production
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    networks:
      - spatial-ai-network
    depends_on:
      - valkey
      - mongodb
      - minio
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 32G
        reservations:
          cpus: '4'
          memory: 16G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

networks:
  spatial-ai-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  valkey_data:
    driver: local
  minio_data:
    driver: local
