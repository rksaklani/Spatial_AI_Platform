services:
  # MongoDB database
  mongodb:
    image: mongo:7.0
    container_name: spatial-ai-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: spatial_ai_platform
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - spatial-ai-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Valkey for caching and job queue
  valkey:
    image: valkey/valkey:7.2
    container_name: spatial-ai-valkey
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
      - ./backend/config/valkey.conf:/usr/local/etc/valkey/valkey.conf
    networks:
      - spatial-ai-network
    command: valkey-server /usr/local/etc/valkey/valkey.conf
    environment:
      - VALKEY_MAXMEMORY=2gb
      - VALKEY_MAXMEMORY_POLICY=allkeys-lru
    deploy:
      resources:
        limits:
          memory: 2.5G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO object storage
  minio:
    image: minio/minio:latest
    container_name: spatial-ai-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    networks:
      - spatial-ai-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # FastAPI API server
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: spatial-ai-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://admin:admin123@mongodb:27017/spatial_ai_platform?authSource=admin
      - DATABASE_NAME=spatial_ai_platform
      - VALKEY_HOST=valkey
      - VALKEY_PORT=6379
      - VALKEY_DB=0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin123
      - MINIO_SECURE=false
      - CELERY_BROKER_URL=redis://valkey:6379/0
      - CELERY_RESULT_BACKEND=redis://valkey:6379/0
      - JWT_SECRET_KEY=dev-secret-key-change-in-production
      - ENVIRONMENT=development
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:5173"]
    volumes:
      - ./backend:/app
    networks:
      - spatial-ai-network
    depends_on:
      mongodb:
        condition: service_healthy
      valkey:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Celery worker for CPU tasks
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: spatial-ai-celery-worker
    restart: unless-stopped
    environment:
      - MONGODB_URL=mongodb://admin:admin123@mongodb:27017/spatial_ai_platform?authSource=admin
      - DATABASE_NAME=spatial_ai_platform
      - VALKEY_HOST=valkey
      - VALKEY_PORT=6379
      - VALKEY_DB=0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin123
      - MINIO_SECURE=false
      - CELERY_BROKER_URL=redis://valkey:6379/0
      - CELERY_RESULT_BACKEND=redis://valkey:6379/0
      - ENVIRONMENT=development
    volumes:
      - ./backend:/app
    networks:
      - spatial-ai-network
    depends_on:
      - valkey
      - mongodb
      - minio
    command: celery -A workers.celery_app worker --loglevel=info --queues=cpu --concurrency=4

  # Celery worker for GPU tasks (requires NVIDIA GPU)
  celery-gpu-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.gpu
      target: development
    container_name: spatial-ai-celery-gpu-worker
    restart: unless-stopped
    environment:
      - MONGODB_URL=mongodb://admin:admin123@mongodb:27017/spatial_ai_platform?authSource=admin
      - DATABASE_NAME=spatial_ai_platform
      - VALKEY_HOST=valkey
      - VALKEY_PORT=6379
      - VALKEY_DB=0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin123
      - MINIO_SECURE=false
      - CELERY_BROKER_URL=redis://valkey:6379/0
      - CELERY_RESULT_BACKEND=redis://valkey:6379/0
      - ENVIRONMENT=development
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - GAUSSIAN_SPLATTING_PATH=/opt/gaussian-splatting
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      - ./backend:/app
    networks:
      - spatial-ai-network
    depends_on:
      - valkey
      - mongodb
      - minio
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # Comment out this service if you don't have an NVIDIA GPU
    profiles:
      - gpu

  # React frontend (optional for local development)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: spatial-ai-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - spatial-ai-network
    depends_on:
      - api
    profiles:
      - frontend

networks:
  spatial-ai-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  valkey_data:
    driver: local
  minio_data:
    driver: local
